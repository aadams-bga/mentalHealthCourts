<!DOCTYPE html>
<div id="mhc-venn-sim">
    <style>
        #mhc-venn-sim {
            max-width: 900px;
            margin: 40px auto;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #333;
            text-align: center;
            position: relative;
        }
        #mhc-venn-sim svg {
            width: 100%;
            height: auto;
            display: block;
        }
        #mhc-venn-sim .venn-circle {
            fill: rgba(0, 0, 0, 0.02);
            stroke: #eee;
            stroke-width: 1;
        }
        #mhc-venn-sim .label-main {
            font-size: 12pt;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            fill: #333;
        }
        #mhc-venn-sim .dot {
            stroke: #fff;
            stroke-width: 1px;
            cursor: pointer;
        }
        
        /* Tooltip Style */
        #mhc-venn-sim #venn-tooltip {
            position: fixed;
            background: #fff;
            border: none;
            border-left: 4px solid #FAC346;
            padding: 12px 16px;
            pointer-events: none;
            display: none;
            z-index: 9999;
            max-width: 260px;
            font-size: 11pt;
            line-height: 1.4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: left;
        }
        #mhc-venn-sim #venn-tooltip b {
            display: block;
            font-size: 13pt;
            margin-bottom: 4px;
            color: #000;
            text-transform: uppercase;
        }
    </style>

    <div style="padding: 0 20px;">
        <h2 style="font-size: 1.8rem; margin-bottom: 10px; font-weight: 800;">Funding the Courts</h2>
        <p style="font-size: 11pt; color: #666; max-width: 650px; margin: 0 auto 20px auto;">
            The overlap represents mental health courts receiving state-level Adult Redeploy Illinois (ARI) funding. Each dot represents one specific program.
        </p>
    </div>

    <div id="venn-tooltip"></div>
    <svg id="venn-svg" viewBox="0 0 800 500"></svg>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        const rawData = [
            {c:"Boone County",t:"ARI probation program",a:1,m:0},
            {c:"Washinton/Perry Counties",t:"Drug Court",a:1,m:0},
            {c:"Christian County",t:"Drug Court",a:1,m:0},
            {c:"Clinton County",t:"Drug Court",a:1,m:0},
            {c:"Effingham County",t:"Drug Court",a:1,m:0},
            {c:"Adams County",t:"Drug Court",a:1,m:0},
            {c:"Boone County",t:"Drug Court",a:1,m:0},
            {c:"Grundy County",t:"Drug Court",a:1,m:0},
            {c:"Jersey County",t:"Drug Court",a:1,m:0},
            {c:"Kendall County",t:"Drug Court",a:1,m:0},
            {c:"LaSalle County",t:"Drug Court",a:1,m:0},
            {c:"Lake County",t:"Drug Court",a:1,m:0},
            {c:"Madison County",t:"Drug Court",a:1,m:0},
            {c:"Peoria County",t:"Drug Court",a:1,m:0},
            {c:"Sangamon County",t:"Drug Court",a:1,m:0},
            {c:"Will County",t:"Drug Court",a:1,m:0},
            {c:"Fayette County",t:"Drug Court",a:1,m:0},
            {c:"Knox County",t:"Drug Court",a:1,m:0},
            {c:"Fulton County",t:"Drug Court",a:1,m:0},
            {c:"McDonough County",t:"Drug Court",a:1,m:0},
            {c:"Hancock County",t:"Drug Court",a:1,m:0},
            {c:"Warren/Henderson Counties",t:"Drug Court",a:1,m:0},
            {c:"Cook County",t:"Drug Court",a:1,m:0},
            {c:"DeKalb County",t:"Drug/DUI Court",a:1,m:0},
            {c:"Lake County",t:"DUI Diversion Program",a:1,m:0},
            {c:"Effingham County",t:"Integrated Care",a:1,m:0},
            {c:"St. Clair County",t:"Intensive Probation",a:1,m:0},
            {c:"DuPage County",t:"Intensive Probation",a:1,m:0},
            {c:"LaSalle County",t:"Intensive Probation",a:1,m:0},
            {c:"Macon County",t:"Intensive Probation",a:1,m:0},
            {c:"McLean County",t:"Intensive Probation",a:1,m:0},
            {c:"Peoria County",t:"Intensive Probation",a:1,m:0},
            {c:"Montgomery County",t:"LEAP program",a:1,m:0},
            {c:"St. Clair County MHC",t:"Mental Health Court",a:1,m:1},
            {c:"Christian County",t:"Mental Health Court",a:1,m:1},
            {c:"Effingham County",t:"Mental Health Court",a:1,m:1},
            {c:"Adams County",t:"Mental Health Court",a:1,m:1},
            {c:"DeKalb County",t:"Mental Health Court",a:1,m:1},
            {c:"Grundy County",t:"Mental Health Court",a:1,m:1},
            {c:"Kendall County",t:"Mental Health Court",a:1,m:1},
            {c:"LaSalle County",t:"Mental Health Court",a:1,m:1},
            {c:"Lake County",t:"Mental Health Court",a:1,m:1},
            {c:"Madison County",t:"Mental Health Court",a:1,m:1},
            {c:"Montgomery County",t:"Mental Health Court",a:1,m:1},
            {c:"Peoria County",t:"Mental Health Court",a:1,m:1},
            {c:"Sangamon County",t:"Mental Health Court",a:1,m:1},
            {c:"Will County",t:"Mental Health Court",a:1,m:1},
            {c:"Monroe County",t:"Mental health treatment",a:1,m:0},
            {c:"Cook County",t:"Mental Health Court",a:1,m:1},
            {c:"Adams County",t:"Pretrial services",a:1,m:0},
            {c:"Adams County",t:"RISE program",a:1,m:0},
            {c:"Cook County",t:"RRP",a:1,m:0},
            {c:"2nd Judicial Circuit",t:"Substance Abuse/MH",a:1,m:0},
            {c:"Christian County",t:"Veterans Court",a:1,m:1},
            {c:"Effingham County",t:"Veterans Court",a:1,m:1},
            {c:"Kendall County",t:"Veterans Court",a:1,m:1},
            {c:"Lake County",t:"Veterans Court",a:1,m:1},
            {c:"Madison County",t:"Veterans Court",a:1,m:1},
            {c:"Peoria County",t:"Veterans Court",a:1,m:1},
            {c:"Sangamon County",t:"Veterans Court",a:1,m:1},
            {c:"Will County",t:"Veterans Court",a:1,m:1},
            {c:"Grundy County",t:"Veterans treatment",a:1,m:1},
            {c:"Vermilion County",t:"Mental Health Court",a:0,m:1},
            {c:"Macon County",t:"Mental Health Court",a:0,m:1},
            {c:"Tazewell County",t:"Mental Health Court",a:0,m:1},
            {c:"Rock Island",t:"Mental Health Court",a:0,m:1},
            {c:"Kankakee",t:"Mental Health Court",a:0,m:1},
            {c:"22nd Judicial Circuit",t:"Mental Health Court",a:0,m:1},
            {c:"DuPage County",t:"MICAP",a:0,m:1},
            {c:"Kane County",t:"Treatment Alternative Court",a:0,m:1}
        ];

        const width = 800;
        const height = 500;
        const svg = d3.select("#venn-svg");
        const tooltip = d3.select("#venn-tooltip");

        rawData.forEach(d => {
            if (d.a && d.m) d.group = 'both';
            else if (d.a) d.group = 'ari';
            else d.group = 'mhc';
        });

        // Centers adjusted to pull ARI and MHC dots further away from the overlap
        const centers = {
            ari: { x: width * 0.28, y: height * 0.5 },
            both: { x: width * 0.5, y: height * 0.5 },
            mhc: { x: width * 0.72, y: height * 0.5 }
        };

        // Smaller Circle Radius (180)
        const circleR = 180;
        const circleOffset = 120; // Distance from center for circle backgrounds
        
        svg.append("circle").attr("cx", width/2 - circleOffset).attr("cy", height/2).attr("r", circleR).attr("class", "venn-circle");
        svg.append("circle").attr("cx", width/2 + circleOffset).attr("cy", height/2).attr("r", circleR).attr("class", "venn-circle");

        svg.append("text").attr("x", 40).attr("y", 50).attr("class", "label-main").text("ARI Programs");
        svg.append("text").attr("x", width - 40).attr("y", 50).attr("class", "label-main").attr("text-anchor", "end").text("Mental Health Courts");

        const nodes = rawData.map(d => ({...d}));
        const nodeElements = svg.append("g")
            .selectAll("circle")
            .data(nodes)
            .enter().append("circle")
            .attr("r", 7)
            .attr("class", "dot")
            .attr("fill", d => d.group === 'both' ? '#FAC346' : (d.group === 'ari' ? '#aaa' : '#555'));

        const simulation = d3.forceSimulation(nodes)
            .force("x", d3.forceX(d => centers[d.group].x).strength(0.15))
            .force("y", d3.forceY(d => centers[d.group].y).strength(0.15))
            .force("collide", d3.forceCollide(9))
            .on("tick", () => {
                nodeElements.attr("cx", d => d.x).attr("cy", d => d.y);
            });

        nodeElements.on("mouseover", function(e, d) {
            // Reintroduced expansion animation
            d3.select(this).transition().duration(200).attr("r", 12).attr("stroke", "#000").attr("stroke-width", 2);
            
            tooltip.style("display", "block");
            tooltip.html(`<b>${d.c}</b>Type of program: ${d.t}`);
        })
        .on("mousemove", function(e) {
            const rect = tooltip.node().getBoundingClientRect();
            let x = e.clientX + 20;
            let y = e.clientY + 20;
            if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - 20;
            if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - 20;
            if (x < 10) x = 10;
            if (y < 10) y = 10;
            tooltip.style("left", x + "px").style("top", y + "px");
        })
        .on("mouseout", function() {
            // Restore original size
            d3.select(this).transition().duration(200).attr("r", 7).attr("stroke", "#fff").attr("stroke-width", 1);
            tooltip.style("display", "none");
        });

    })();
    </script>
</div>
