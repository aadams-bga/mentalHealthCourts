<!DOCTYPE html>
<div class="v-alluvial-container" id="alluvial-root" style="max-width: 450px; margin: 40px auto; font-family: -apple-system, sans-serif;">
    <style>
        .v-alluvial-container {
            background: #fff;
            padding: 10px;
            overflow: hidden;
        }
        .v-alluvial-container svg {
            width: 100%;
            height: auto;
        }
        
        /* Initial States */
        .node-group {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .flow-path {
            fill: rgba(0, 0, 0, 0.07);
            clip-path: inset(0 0 100% 0); /* Hidden top-to-bottom */
            transition: clip-path 1.2s cubic-bezier(0.4, 0, 0.2, 1), fill 0.3s;
        }

        .step-label {
            font-size: 10px;
            fill: #bbb;
            letter-spacing: 1px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* Animation Triggered States */
        .is-visible .flow-path {
            clip-path: inset(0 0 0 0);
        }
        
        .is-visible .node-group, 
        .is-visible .step-label {
            opacity: 1;
            transform: translateY(0);
        }

        /* Sequential Delays */
        .is-visible .step-0 { transition-delay: 0.1s; }
        .is-visible .flow-0-1 { transition-delay: 0.3s; }
        .is-visible .step-1 { transition-delay: 0.9s; }
        .is-visible .flow-1-2 { transition-delay: 1.1s; }
        .is-visible .step-2 { transition-delay: 1.7s; }

        /* Hover Styles */
        .flow-path:hover {
            fill: rgba(230, 57, 70, 0.2);
        }
        
        .node-rect { fill: #333; }
        .node-label { font-size: 12px; font-weight: 600; fill: #333; text-transform: uppercase; }
        .node-value { font-size: 10px; fill: #888; }
    </style>

    <svg viewBox="0 0 400 550" xmlns="http://www.w3.org/2000/svg">
        <!-- Step Labels -->
        <text x="0" y="20" class="step-label step-0">STEP 0: RAW DATA</text>
        <text x="0" y="220" class="step-label step-1">STEP 1: ANALYSIS</text>
        <text x="0" y="420" class="step-label step-2">STEP 2: FINDINGS</text>

        <!-- Flows: Step 0 to Step 1 -->
        <g class="flow-0-1">
            <path d="M 50,60 C 50,150 100,150 100,240 L 180,240 C 180,150 130,150 130,60 Z" class="flow-path" />
            <path d="M 130,60 C 130,150 250,150 250,240 L 320,240 C 320,150 200,150 200,60 Z" class="flow-path" />
            <path d="M 250,60 C 250,150 180,150 180,240 L 230,240 C 230,150 300,150 300,60 Z" class="flow-path" />
        </g>

        <!-- Flows: Step 1 to Step 2 -->
        <g class="flow-1-2">
            <path d="M 100,260 C 100,350 40,350 40,440 L 130,440 C 130,350 210,350 210,260 Z" class="flow-path" />
            <path d="M 210,260 C 210,350 160,350 160,440 L 230,440 C 230,350 230,350 230,260 Z" class="flow-path" />
            <path d="M 250,260 C 250,350 280,350 280,440 L 360,440 C 360,350 320,260 320,260 Z" class="flow-path" />
        </g>

        <!-- Nodes Step 0 -->
        <g class="node-group step-0">
            <rect x="50" y="40" width="150" height="20" rx="2" class="node-rect" />
            <text x="50" y="35" class="node-label">Public Records</text>
            <text x="175" y="35" class="node-value" text-anchor="end">1,240</text>
            
            <rect x="250" y="40" width="50" height="20" rx="2" class="node-rect" />
            <text x="250" y="35" class="node-label">Tips</text>
            <text x="300" y="35" class="node-value" text-anchor="end">310</text>
        </g>

        <!-- Nodes Step 1 -->
        <g class="node-group step-1">
            <rect x="100" y="240" width="130" height="20" rx="2" class="node-rect" style="fill: #555;" />
            <text x="100" y="235" class="node-label">Verified</text>
            <rect x="250" y="240" width="70" height="20" rx="2" class="node-rect" style="fill: #555;" />
            <text x="250" y="235" class="node-label">Flagged</text>
        </g>

        <!-- Nodes Step 2 -->
        <g class="node-group step-2">
            <rect x="40" y="440" width="90" height="20" rx="2" class="node-rect" style="fill: #e63946;" />
            <text x="40" y="435" class="node-label">Confirmed</text>
            <rect x="160" y="440" width="70" height="20" rx="2" class="node-rect" style="fill: #999;" />
            <text x="160" y="435" class="node-label">Inconclusive</text>
            <rect x="280" y="440" width="80" height="20" rx="2" class="node-rect" style="fill: #ddd;" />
            <text x="280" y="435" class="node-label">Dismissed</text>
        </g>
    </svg>

    <script>
        (function() {
            const root = document.getElementById('alluvial-root');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        root.classList.add('is-visible');
                        // Optional: stop observing once triggered
                        // observer.unobserve(root);
                    }
                });
            }, { 
                threshold: 0.2 // Trigger when 20% visible
            });
            observer.observe(root);
        })();
    </script>
</div>
