<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Scrolly Alluvial</title>
    <!-- GSAP Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #fff; }
        
        .scrolly-section {
            position: relative;
            width: 100%;
        }

        .sticky-wrapper {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #gsap-svg {
            width: 100%;
            max-width: 500px;
            height: auto;
            padding: 20px;
        }

        /* Initial hidden states for GSAP to reveal */
        .node { opacity: 0; transform: translateY(10px); }
        .ribbon { 
            fill: rgba(0,0,0,0.05); 
            clip-path: inset(0 0 100% 0); /* Clipped from bottom */
        }
        .text-label { font-size: 12px; font-weight: bold; fill: #333; opacity: 0; }
        .step-indicator { font-size: 10px; fill: #bbb; letter-spacing: 2px; }

        /* The scroll "track" - defines how long the scroll lasts */
        .scroll-track {
            height: 300vh; /* 3 screens worth of scrolling */
            position: relative;
            pointer-events: none;
        }

        .narrative-overlay {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 300px;
            z-index: 10;
        }

        .narrative-card {
            margin-top: 80vh;
            background: white;
            padding: 20px;
            border: 1px solid #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 8px;
            margin-bottom: 50vh;
        }
    </style>
</head>
<body>

<div class="scrolly-section">
    <!-- The Fixed Graphic -->
    <div class="sticky-wrapper">
        <svg id="gsap-svg" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
            <text x="0" y="30" class="step-indicator">01 DATA INTAKE</text>
            <text x="0" y="230" class="step-indicator">02 ANALYSIS</text>
            <text x="0" y="430" class="step-indicator">03 VERDICT</text>

            <!-- Ribbons Step 1 -->
            <path d="M 60,70 C 60,150 120,150 120,250 L 200,250 C 200,150 140,150 140,70 Z" class="ribbon ribbon-1" />
            <path d="M 260,70 C 260,150 200,150 200,250 L 280,250 C 280,150 340,150 340,70 Z" class="ribbon ribbon-1" />

            <!-- Ribbons Step 2 -->
            <path d="M 120,270 C 120,350 60,350 60,450 L 150,450 C 150,350 200,350 200,270 Z" class="ribbon ribbon-2" />
            <path d="M 200,270 C 200,350 280,350 280,450 L 340,450 C 340,350 280,350 280,270 Z" class="ribbon ribbon-2" />

            <!-- Nodes -->
            <g class="node node-0">
                <rect x="60" y="50" width="80" height="20" rx="3" fill="#333" />
                <text x="60" y="45" class="text-label" style="opacity:1">Public Data</text>
                <rect x="260" y="50" width="80" height="20" rx="3" fill="#333" />
                <text x="260" y="45" class="text-label" style="opacity:1">Field Tips</text>
            </g>

            <g class="node node-1">
                <rect x="120" y="250" width="160" height="20" rx="3" fill="#666" />
                <text x="120" y="245" class="text-label">Processing</text>
            </g>

            <g class="node node-2">
                <rect x="60" y="450" width="90" height="20" rx="3" fill="#e63946" />
                <text x="60" y="445" class="text-label">Validated</text>
                <rect x="250" y="450" width="90" height="20" rx="3" fill="#ccc" />
                <text x="250" y="445" class="text-label">Dismissed</text>
            </g>
        </svg>
    </div>

    <!-- The Narrative Track -->
    <div class="scroll-track">
        <div class="narrative-overlay">
            <div class="narrative-card">
                <h3>The Intake</h3>
                <p>We start with raw streams of data from disparate sources across the state.</p>
            </div>
            <div class="narrative-card">
                <h3>The Consolidation</h3>
                <p>As you scroll, notice how the streams merge into a single analysis pipeline.</p>
            </div>
            <div class="narrative-card">
                <h3>The Result</h3>
                <p>The final stage separates the confirmed violations from the noise.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Register the ScrollTrigger plugin
    gsap.registerPlugin(ScrollTrigger);

    // Create a master timeline linked to the scroll position
    const tl = gsap.timeline({
        scrollTrigger: {
            trigger: ".scroll-track", // What element triggers the scroll
            start: "top top",         // Start when the top of the track hits the top of the viewport
            end: "bottom bottom",     // End when the bottom hits the bottom
            scrub: 1,                 // Smooth scrubbing (1 second delay for smoothness)
            markers: false            // Turn true to debug start/end points
        }
    });

    // BUILD THE ANIMATION SEQUENCE
    
    // 1. Initial nodes appear
    tl.to(".node-0", { opacity: 1, y: 0, duration: 0.5 });

    // 2. First ribbons pour down
    tl.to(".ribbon-1", { clipPath: "inset(0 0 0% 0)", duration: 2, ease: "power1.inOut" });

    // 3. Middle node appears
    tl.to(".node-1", { opacity: 1, y: 0, duration: 0.5 });
    tl.to(".node-1 .text-label", { opacity: 1, duration: 0.3 }, "-=0.3");

    // 4. Second ribbons pour down
    tl.to(".ribbon-2", { clipPath: "inset(0 0 0% 0)", duration: 2, ease: "power1.inOut" });

    // 5. Final nodes appear
    tl.to(".node-2", { opacity: 1, y: 0, duration: 0.5 });
    tl.to(".node-2 .text-label", { opacity: 1, duration: 0.3 }, "-=0.3");

</script>

</body>
</html>
